services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: calendly_lite
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d calendly_lite"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./server
    ports:
      - "3000:3000"
    env_file:
      - ./server/.env.docker
    depends_on:
      db:
        condition: service_healthy

  client:
    build:
      context: ./client
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  postgres_data: